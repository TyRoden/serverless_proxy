services:
  runpod-proxy:
    build: .
    container_name: runpod-serverless-proxy
    ports:
      - "8002:8002"
    environment:
      - RUNPOD_API_KEY=your_runpod_api_key
      - RUNPOD_ENDPOINT_ID=your_endpoint_id
      - MODEL_NAME=qwen3.5:27b
      - ENDPOINT_TYPE=ollama
      - TIMEOUT=300
    restart: unless-stopped
    networks:
      - default
      - ai-queue-master_default

networks:
  default:
  ai-queue-master_default:
    external: true
