services:
  runpod-proxy:
    build: .
    container_name: runpod-serverless-proxy
    ports:
      - "8002:8002"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - default
      - ai-queue-master_default

networks:
  default:
  ai-queue-master_default:
    external: true
